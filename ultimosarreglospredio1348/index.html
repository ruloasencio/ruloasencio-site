<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Últimos arreglos · Predio 1348</title>
<style>
  :root {
    --bg:#ffffff; --ink:#1d1d1f; --muted:#86868b; --line:#e8e8ed; --card:#fbfbfd;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.4; padding:64px 24px 96px;
  }
  .wrap { max-width:720px; margin:0 auto; }
  h1 { font-size:40px; font-weight:600; letter-spacing:-0.02em; line-height:1.15; margin-bottom:48px; }
  h1 .sep { color:var(--muted); font-weight:400; }
  .cards { display:flex; flex-direction:column; gap:20px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px; }
  .photo { position:relative; border-radius:12px; overflow:hidden; line-height:0; margin-bottom:18px; }
  .photo img { width:100%; height:auto; display:block; }
  .photo.is-video { background:#f0f0f3; display:flex; justify-content:center; }
  .vwrap { position:relative; width:100%; max-width:380px; aspect-ratio:240/426; }
  .vwrap iframe { position:absolute; inset:0; width:100%; height:100%; border:0; }
  .num {
    position:absolute; top:14px; left:14px; width:40px; height:40px; z-index:2;
    display:flex; align-items:center; justify-content:center;
    background:#fff; border:1.5px solid #1d1d1f; border-radius:50%;
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif; font-weight:700; font-size:18px;
    color:#1d1d1f; font-variant-numeric:tabular-nums;
  }
  .status {
    position:absolute; top:14px; right:14px; z-index:2;
    background:rgba(255,255,255,0.92); color:#515154; border:1px solid #c6c6cb;
    font-size:13px; font-weight:600; padding:5px 13px; border-radius:999px;
    line-height:1.2; backdrop-filter:blur(6px);
  }
  .data { display:flex; flex-direction:column; gap:10px; padding:0 4px; }
  .row { display:flex; align-items:baseline; gap:10px; }
  .ico { font-size:17px; line-height:1.4; flex-shrink:0; }
  .txt { font-size:16px; letter-spacing:-0.01em; }
  .lbl { color:var(--muted); margin-right:4px; }
  @media (max-width:480px) {
    body { padding:40px 18px 64px; }
    h1 { font-size:30px; margin-bottom:36px; }
    .card { padding:14px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Card 64<span class="sep">&nbsp;&nbsp;|&nbsp;&nbsp;</span>Video</h1>
  <div class="cards" id="cards"></div>
</div>

<!-- ====== DATOS EDITABLES: una línea por foto ====== -->
<script>
const TAREAS = [
  {n:64, video:"1205649074", status:"Pendiente", ubic:"Portón de ingreso · picaporte", tarea:"Revisar y reparar picaporte", resp:"Gero & Agus"}
];
</script>

<script>
  const cards = document.getElementById('cards');
  TAREAS.forEach(it => {
    const c = document.createElement('div'); c.className='card';
    const badges = `<span class="num">${it.n}</span><span class="status">${it.status}</span>`;
    const media = it.video
      ? `<figure class="photo is-video"><div class="vwrap">${badges}<iframe src="https://player.vimeo.com/video/${it.video}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe></div></figure>`
      : `<figure class="photo">${badges}<img src="${it.img}" alt="Tarea ${it.n}" loading="lazy"></figure>`;
    c.innerHTML = `
      ${media}
      <div class="data">
        <div class="row"><span class="ico">📍</span><span class="txt"><span class="lbl">Ubicación</span> ${it.ubic}</span></div>
        <div class="row"><span class="ico">☑️</span><span class="txt"><span class="lbl">Tarea</span> ${it.tarea}</span></div>
        <div class="row"><span class="ico">👤</span><span class="txt"><span class="lbl">Responsable</span> ${it.resp}</span></div>
      </div>`;
    cards.appendChild(c);
  });
</script>
</body>
</html>
