<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local Buenos Aires 1350 · Alquiler Mensual</title>
<style>
  :root {
    --bg: #ffffff;
    --ink: #1d1d1f;
    --muted: #86868b;
    --line: #e8e8ed;
    --card: #fbfbfd;

    --amt-bg: #4a7c43;  --amt-ink: #ffffff;     /* monto verde (ya pagado) */
    --red-bg: #c0382f;  --red-ink: #ffffff;      /* monto rojo (opción danger) */
    --due-bg: #fbedcb;  --due-ink: #8a5a0c;      /* monto pendiente (ámbar) */
    --bonif-bg: #eef5ec; --bonif-ink: #4a7c43;   /* bonificado */
    --neut-bg: #f0f0f3;  --neut-ink: #515154;    /* sin factura / ya pagado */
    --out-line: #c6c6cb;                          /* outline / a definir */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.4;
    padding: 64px 24px 96px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }

  h1 { font-size: 40px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 12px; line-height: 1.15; }
  h1 .sep { color: var(--muted); font-weight: 400; }
  .subtitle { font-size: 17px; color: var(--muted); letter-spacing: -0.01em; margin-bottom: 48px; max-width: 560px; }

  .section { margin-bottom: 48px; }
  .section:last-child { margin-bottom: 0; }

  h2 {
    font-size: 13px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 18px;
  }

  .cards { display: flex; flex-direction: column; gap: 12px; }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .card-main { min-width: 0; flex-shrink: 0; }
  .card-month { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .card-count {
    font-size: 12px; color: var(--muted); margin-top: 3px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: -0.02em; font-variant-numeric: tabular-nums;
  }

  .pills { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .pill {
    font-size: 13px; font-weight: 600;
    padding: 5px 13px; border-radius: 999px;
    border: 1px solid transparent; white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .pill-amt   { background: var(--amt-bg); color: var(--amt-ink); }
  .pill-red   { background: var(--red-bg); color: var(--red-ink); }
  .pill-due   { background: var(--due-bg); color: var(--due-ink); }
  .pill-bonif { background: var(--bonif-bg); color: var(--bonif-ink); }
  .pill-neut  { background: var(--neut-bg); color: var(--neut-ink); }
  .pill-pend  { background: transparent; border: 1px solid var(--out-line); color: var(--neut-ink); }
  .pill-tbd   { background: transparent; border: 1px dashed var(--out-line); color: var(--muted); font-weight: 400; white-space: normal; text-align: right; }

  @media (max-width: 480px) {
    body { padding: 40px 18px 64px; }
    h1 { font-size: 30px; margin-bottom: 10px; }
    .subtitle { font-size: 16px; margin-bottom: 36px; }
    .card { flex-direction: column; align-items: flex-start; gap: 10px; }
    .pills { justify-content: flex-start; }
  }
</style>
</head>
<body>
<div class="wrap">

  <h1>Local Buenos Aires 1350<span class="sep">&nbsp;&nbsp;|&nbsp;&nbsp;</span>Alquiler Mensual</h1>
  <p class="subtitle">Info para emisión de facturas en concepto de pago alquiler mes entero por adelantado.</p>

  <div id="app"></div>

</div>

<script>
/* ============================================================
   ÚNICO LUGAR QUE SE EDITA: los montos.
   Cuando ajuste el IPC, reemplazá los null del cuatrimestre
   que corresponda por el monto nuevo. Nada más.

   - monto: número en pesos (null = "A definir según índice IPC")
   - bonif: true = mes bonificado, sin factura
   - atrasado: true = fuerza el estado a impago (rojo),
     por si algún mes Patricia no paga en fecha
   ============================================================ */
const MONTOS = [
  /* 2026 */
  { bonif: true },              // Mayo      · Mes 1
  { bonif: true },              // Junio     · Mes 2
  { monto: 900000 },            // Julio     · Mes 3
  { monto: 900000 },            // Agosto    · Mes 4
  { monto: null },              // Septiembre· Mes 5  ← IPC
  { monto: null },              // Octubre   · Mes 6
  { monto: null },              // Noviembre · Mes 7
  { monto: null },              // Diciembre · Mes 8
  /* 2027 */
  { monto: null }, { monto: null }, { monto: null }, { monto: null },  // Ene–Abr · 9–12
  { monto: null }, { monto: null }, { monto: null }, { monto: null },  // May–Ago · 13–16
  { monto: null }, { monto: null }, { monto: null }, { monto: null },  // Sep–Dic · 17–20
  /* 2028 */
  { monto: null }, { monto: null }, { monto: null }, { monto: null },  // Ene–Abr · 21–24
  { monto: null }, { monto: null }, { monto: null }, { monto: null },  // May–Ago · 25–28
  { monto: null }, { monto: null }, { monto: null }, { monto: null },  // Sep–Dic · 29–32
  /* 2029 */
  { monto: null }, { monto: null }, { monto: null }, { monto: null },  // Ene–Abr · 33–36
];

/* ================= Lógica (no hace falta tocar) ================= */
const INICIO = { y: 2026, m: 5 };   // Mayo 2026 = Mes 1 de 36
const DIA_DE_PAGO = 5;              // desde el día 5, el mes en curso pasa a "Ya pagado"

const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const CUATRI = m => m <= 4 ? "1º Cuatrimestre" : m <= 8 ? "2º Cuatrimestre" : "3º Cuatrimestre";
const fmt = n => "$ " + n.toLocaleString("es-AR");

// Fecha actual en Argentina
const ahora = new Date(new Date().toLocaleString("en-US", { timeZone: "America/Argentina/Buenos_Aires" }));
const hoyY = ahora.getFullYear(), hoyM = ahora.getMonth() + 1, hoyD = ahora.getDate();

function pillsDe(mes) {
  if (mes.bonif) {
    return `<span class="pill pill-neut">No se emitió factura</span><span class="pill pill-bonif">Bonificado</span>`;
  }
  if (mes.monto == null) {
    return `<span class="pill pill-tbd">A definir según índice IPC</span>`;
  }
  const clave = mes.y * 100 + mes.m;
  const claveHoy = hoyY * 100 + hoyM;
  const pagado = clave < claveHoy || (clave === claveHoy && hoyD >= DIA_DE_PAGO);

  if (mes.atrasado) {
    return `<span class="pill pill-pend">Pago atrasado</span><span class="pill pill-red">${fmt(mes.monto)}</span>`;
  }
  if (pagado) {
    return `<span class="pill pill-neut">Ya pagado</span><span class="pill pill-amt">${fmt(mes.monto)}</span>`;
  }
  return `<span class="pill pill-pend">Factura aún por emitirse</span><span class="pill pill-due">${fmt(mes.monto)}</span>`;
}

// Armar los 36 meses con año/mes reales
const meses = MONTOS.map((d, i) => {
  const abs = (INICIO.m - 1) + i;
  return { ...d, y: INICIO.y + Math.floor(abs / 12), m: (abs % 12) + 1, n: i + 1 };
});

// Agrupar por cuatrimestre y renderizar
let html = "", grupoActual = "";
for (const mes of meses) {
  const grupo = `Año ${mes.y}&nbsp;&nbsp;|&nbsp;&nbsp;${CUATRI(mes.m)}`;
  if (grupo !== grupoActual) {
    if (grupoActual) html += `</div></section>`;
    html += `<section class="section"><h2>${grupo}</h2><div class="cards">`;
    grupoActual = grupo;
  }
  html += `<div class="card">
    <div class="card-main"><div class="card-month">${MESES[mes.m - 1]}</div><div class="card-count">Mes ${mes.n} de 36</div></div>
    <div class="pills">${pillsDe(mes)}</div>
  </div>`;
}
html += `</div></section>`;
document.getElementById("app").innerHTML = html;
</script>
</body>
</html>
